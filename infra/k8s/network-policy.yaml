apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eshop-ingress-policy
  namespace: eshop
spec:
  podSelector:
    matchLabels:
      app: eshop-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: TCP
          port: 1433
        - protocol: TCP
          port: 3342
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 53
---
apiVersion: v1
kind: Namespace
metadata:
  name: eshop
  labels:
    name: eshop
